services:
  biblioteca_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca_web
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    networks:
      - biblioteca-net
      - proxy-net  # Required for Cloudflare/Nginx in homelab

# Optional: Uncomment this if you don't have an external Postgres database
#   db:
#     image: postgres:15-alpine
#     container_name: biblioteca_db
#     ... (configuration omitted for brevity in comment, refer to .env.example)

networks:
  biblioteca-net:
    driver: bridge
  proxy-net:
    external: true
    name: proxy-net
